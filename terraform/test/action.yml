name: Terraform test
description: Discover and run Terraform tests

runs:
  using: composite
  steps:
    - name: Find and run Terraform tests
      shell: bash
      run: |
        dirs=$(find terraform -name '*.tftest.hcl' -not -path '*/.terraform/*' -exec dirname {} \; | sed 's|/tests$||' | sort -u)

        if [ -z "$dirs" ]; then
          echo "No test directories found"
          exit 0
        fi

        failed=0
        for dir in $dirs; do
          echo "::group::Test ($dir)"
          echo "Running terraform test in $dir"
          terraform -chdir="$dir" init -backend=false
          if ! terraform -chdir="$dir" test; then
            failed=1
          fi
          echo "::endgroup::"
        done

        if [ "$failed" -ne 0 ]; then
          echo "::error::One or more Terraform tests failed"
          exit 1
        fi
